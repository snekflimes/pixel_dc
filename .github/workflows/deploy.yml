name: Deploy to hosting (pixeldc)

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch: {}

concurrency:
  group: deploy-pixeldc
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_PEERJS_HOST: ${{ vars.VITE_PEERJS_HOST }}
          VITE_PEERJS_PORT: ${{ vars.VITE_PEERJS_PORT }}
          VITE_PEERJS_PATH: ${{ vars.VITE_PEERJS_PATH }}
          VITE_PEERJS_KEY: ${{ vars.VITE_PEERJS_KEY }}
          VITE_PEERJS_SECURE: ${{ vars.VITE_PEERJS_SECURE }}
        run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}

